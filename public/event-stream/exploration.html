<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>XACT — Design Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800;900&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .logo-card {
    background: #06070b;
    --logo-cut: #06070b;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .logo-card.light { background: #f5f1ea; --logo-cut: #f5f1ea; border-color: rgba(20,18,14,0.1); }
  .logo-disp {
    flex: 1;
    padding: 24px 28px;
    color: #e8eaf0;
    display: flex; align-items: center;
    min-height: 160px;
    background:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .logo-card.light .logo-disp {
    color: #14120e;
    background:
      linear-gradient(rgba(20,18,14,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,18,14,0.04) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .logo-meta {
    padding: 14px 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo-card.light .logo-meta {
    border-top-color: rgba(20,18,14,0.08);
    background: rgba(20,18,14,0.02);
  }
  .logo-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #5d6478;
  }
  .logo-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: #ff6b35;
    letter-spacing: 0.08em;
  }
  .logo-name {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: #e8eaf0;
    letter-spacing: 0.04em;
  }
  .logo-card.light .logo-name { color: #14120e; }
  .logo-tag {
    font-size: 11px;
    color: #9ba1b3;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  .logo-card.light .logo-tag { color: #5b574e; }
  .logo-vibe {
    position: absolute;
    top: 14px; right: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: #5d6478;
    text-transform: uppercase;
  }
  .logo-card.light .logo-vibe { color: #8a8478; }

  /* Direction snapshot iframe */
  .dir-frame {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #06070b;
  }
  .dir-frame iframe {
    border: 0;
    width: 1440px;
    height: 1800px;
    transform: scale(0.6667);
    transform-origin: 0 0;
    display: block;
    pointer-events: auto;
  }
  .dir-overlay {
    position: absolute;
    top: 16px; left: 16px;
    z-index: 5;
    pointer-events: none;
    background: rgba(6,7,11,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 8px 12px;
  }
  .dir-overlay-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: #ff6b35;
  }
  .dir-overlay-name {
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.005em;
    margin-top: 2px;
  }
  .dir-overlay-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: #9ba1b3;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logos.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const LOGOS = window.XACT_LOGOS;

function LogoCard({ logo, idx, light }) {
  const Comp = logo.comp;
  return (
    <div className={`logo-card ${light ? 'light' : ''}`}>
      {logo.vibe && <div className="logo-vibe">{logo.vibe}</div>}
      <div className="logo-disp"><Comp/></div>
      <div className="logo-meta">
        <div>
          <div className="logo-name">{logo.name}</div>
          <div className="logo-tag">{logo.tag}</div>
        </div>
        <div className="logo-id">CONCEPT 0{idx + 1}</div>
      </div>
    </div>
  );
}

function DirSnap({ url, num, name, tag }) {
  return (
    <div className="dir-frame">
      <div className="dir-overlay">
        <div className="dir-overlay-num">DIRECTION 0{num}</div>
        <div className="dir-overlay-name">{name}</div>
        <div className="dir-overlay-tag">{tag}</div>
      </div>
      <iframe src={url} scrolling="no" loading="lazy"/>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas defaultZoom={0.45}>
      <DCSection id="logos" title="LOGO CONCEPTS · WORDMARK + MARK"
        subtitle="5 directions · each rooted in fire-protection engineering language. Pick one to take further.">
        {LOGOS.map((l, i) => (
          <DCArtboard key={l.id} id={`logo-${l.id}`} label={`0${i+1} · ${l.name}`} width={520} height={260}>
            <LogoCard logo={l} idx={i} light={i === 3}/>
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection id="directions" title="DASHBOARD DIRECTIONS · A / B / C"
        subtitle="Same data, same features — three style temperaments. Click to focus, drag the corner of any artboard to compare.">
        <DCArtboard id="dir-cyber" label="01 · CYBER DARK" width={1440} height={1200}>
          <DirSnap url="XACT Dashboard.html?direction=cyber&pattern=grid&font=inter-tight"
            num="1" name="Cyber Dark" tag="neon orange · glass cards · dense data viz"/>
        </DCArtboard>
        <DCArtboard id="dir-terminal" label="02 · EDITORIAL TERMINAL" width={1440} height={1200}>
          <DirSnap url="XACT Dashboard.html?direction=terminal&pattern=dot&font=instrument"
            num="2" name="Editorial Terminal" tag="warm paper · serif accents · Bloomberg cousin"/>
        </DCArtboard>
        <DCArtboard id="dir-blueprint" label="03 · BLUEPRINT" width={1440} height={1200}>
          <DirSnap url="XACT Dashboard.html?direction=blueprint&pattern=blueprint&font=space-grotesk"
            num="3" name="Blueprint" tag="navy · amber accent · drafting grid as motif"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
